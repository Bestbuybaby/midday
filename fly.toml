app = "midday-ndoztw"

kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "../../Dockerfile"

[env]
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    port = 80

  [[services.ports]]
    port = 443
