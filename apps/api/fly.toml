app = "midday-ndoztw"
primary_region = "fra"

[build]
  dockerfile = "../../Dockerfile"  # Move up to the root directory where Dockerfile is located
  context = "../../"  # Context should be the root directory where all files are located

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "45s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2
